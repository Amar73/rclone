# /etc/systemd/journald.conf.d/10-persistent.conf на arch03/arch04/arch05.
#
# Зачем: история отвалов CephFS (ceph: mds0 caps stale / hung / reconnect denied)
# нужна для разбора инцидентов, а до этого она жила только в кольцевом буфере
# dmesg и в /run/log/journal — то есть в tmpfs. Любая перезагрузка стирала всё.
#
# Побочный эффект, ради которого это стоило сделать и само по себе: на arch04 и
# arch05 журнал занимал по 1.1 ГБ прямо в оперативной памяти. После перевода на
# диск эта память возвращается системе.
#
# Ограничения размера здесь ОБЯЗАТЕЛЬНЫ, а не «на всякий случай»: /var на этих
# хостах уже переполнялся до 100% (старые дампы ABRT на arch05), и это убивало
# бэкап. SystemKeepFree — главный предохранитель: journald остановит запись,
# не доедая раздел до конца, даже если что-то начнёт логировать взахлёб.
[Journal]
Storage=persistent
# Потолок на сам журнал.
SystemMaxUse=1G
# Не занимать последние 5 ГБ /var, что бы ни происходило.
SystemKeepFree=5G
# Мелкие файлы — быстрее ротация, меньше потерь при повреждении.
SystemMaxFileSize=128M
# Больше 90 дней держать незачем: инциденты разбираются по горячим следам.
MaxRetentionSec=90day
