global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # OS-метрики бэкап-хостов. node_exporter там уже развёрнут (v0.17.0 в podman
  # из registry.ceph.kiae.ru) и принадлежит другой команде — мы его не трогаем,
  # только читаем.
  - job_name: node
    static_configs:
      - targets:
          - arch03:9100
          - arch04:9100
          - arch05:9100
    relabel_configs:
      # instance остаётся "arch03:9100", а host= делаем коротким, чтобы он
      # совпадал с меткой host= у backup-метрик и их можно было джойнить.
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: host
        replacement: '${1}'

  # arch-b отдаёт две разные вещи с одного эндпоинта:
  #   1. собственные OS-метрики (про сам arch-b)
  #   2. backup-метрики из textfile-коллектора — они про ДРУГИЕ хосты и несут
  #      собственную метку host="arch03" и т.д.
  # honor_labels: true обязателен: иначе Prometheus сочтёт host= из .prom-файла
  # конфликтующей с target-меткой и переименует её в exported_host, сломав все
  # backup-метрики. При honor_labels собственная метка данных побеждает, а
  # метрикам без неё (node_exporter самого arch-b) метка host=arch-b проставится.
  - job_name: arch-b
    honor_labels: true
    static_configs:
      - targets:
          - localhost:9100
        labels:
          host: arch-b
